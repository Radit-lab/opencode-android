<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6C5CE7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Glow orb -->
  <circle cx="640" cy="320" r="280" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Left section: Logo & Title -->
  <g transform="translate(80, 120)">
    <!-- Terminal bracket -->
    <text x="0" y="0" font-family="monospace" font-size="24" fill="#6C5CE7">┌──(</text>
    <text x="118" y="0" font-family="monospace" font-size="24" fill="#a29bfe">opencode</text>
    <text x="248" y="0" font-family="monospace" font-size="24" fill="#6C5CE7">)</text>
    <text x="276" y="0" font-family="monospace" font-size="24" fill="#2d2d4a">─</text>
    <text x="300" y="0" font-family="monospace" font-size="24" fill="#2d2d4a">(</text>
    <text x="324" y="0" font-family="monospace" font-size="24" fill="#6C5CE7">android</text>
    <text x="444" y="0" font-family="monospace" font-size="24" fill="#2d2d4a">)</text>
    <text x="468" y="0" font-family="monospace" font-size="24" fill="#2d2d4a">─[~]</text>

    <!-- Main title -->
    <text x="10" y="100" font-family="monospace" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="1">
      OpenCode CLI
    </text>
    <text x="10" y="160" font-family="monospace" font-size="28" fill="#a29bfe" letter-spacing="0.5">
      Native Android Install
    </text>

    <!-- Tagline -->
    <text x="10" y="220" font-family="sans-serif" font-size="20" fill="#8888aa">
      Run AI-powered coding on your phone.
    </text>
    <text x="10" y="252" font-family="sans-serif" font-size="20" fill="#8888aa">
      No emulators. No PRoot. Pure native.
    </text>

    <!-- Badge pill -->
    <rect x="10" y="290" width="180" height="36" rx="18" fill="#6C5CE7" opacity="0.2"/>
    <text x="100" y="313" font-family="monospace" font-size="15" fill="#a29bfe" text-anchor="middle">
      ⚡ One-command install
    </text>
  </g>

  <!-- Right section: Terminal preview -->
  <g transform="translate(640, 100)">
    <rect x="0" y="0" width="560" height="420" rx="12" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="1"/>

    <!-- MacOS dots -->
    <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="68" cy="20" r="6" fill="#28c840"/>

    <!-- Terminal content -->
    <text x="24" y="68" font-family="monospace" font-size="16" fill="#6C5CE7">$ </text>
    <text x="42" y="68" font-family="monospace" font-size="16" fill="#cccccc">bash install.sh</text>

    <text x="24" y="96" font-family="monospace" font-size="14" fill="#8888aa">━━━ Phase 1: System Preparation ━━━</text>
    <text x="24" y="120" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="120" font-family="monospace" font-size="14" fill="#cccccc">    Packages updated</text>
    <text x="24" y="144" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="144" font-family="monospace" font-size="14" fill="#cccccc">    Dependencies installed</text>

    <text x="24" y="172" font-family="monospace" font-size="14" fill="#8888aa">━━━ Phase 2: glibc Installation ━━━</text>
    <text x="24" y="196" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="196" font-family="monospace" font-size="14" fill="#cccccc">    glibc repo added</text>
    <text x="24" y="220" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="220" font-family="monospace" font-size="14" fill="#cccccc">    glibc and certs installed</text>

    <text x="24" y="248" font-family="monospace" font-size="14" fill="#8888aa">━━━ Phase 3: Compiling OpenCode ━━━</text>
    <text x="24" y="272" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="272" font-family="monospace" font-size="14" fill="#cccccc">    Build complete</text>
    <text x="24" y="296" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="296" font-family="monospace" font-size="14" fill="#cccccc">    Package installed globally</text>

    <text x="24" y="324" font-family="monospace" font-size="14" fill="#8888aa">━━━ Phase 4: SSL Configuration ━━━</text>
    <text x="24" y="348" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="348" font-family="monospace" font-size="14" fill="#cccccc">    SSL env configured</text>

    <text x="24" y="376" font-family="monospace" font-size="14" fill="#45d6b5">[OK]</text>
    <text x="80" y="376" font-family="monospace" font-size="14" fill="#cccccc">    Storage access granted</text>

    <!-- Blinking cursor -->
    <rect x="24" y="392" width="8" height="14" rx="1" fill="#6C5CE7">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(0, 580)">
    <rect x="0" y="0" width="1280" height="60" fill="#6C5CE7" opacity="0.08"/>
    <text x="50" y="36" font-family="monospace" font-size="16" fill="#6C5CE7">❯ </text>
    <text x="72" y="36" font-family="monospace" font-size="16" fill="#8888aa">github.com/Radit-lab/opencode-android</text>
    <text x="1050" y="36" font-family="monospace" font-size="14" fill="#555577">fork · star · contribute</text>
  </g>
</svg>
